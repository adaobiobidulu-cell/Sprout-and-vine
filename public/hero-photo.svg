  <circle cx="410" cy="300" r="6" fill="#E2845F" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="369" cy="316" r="4" fill="#2C1A0E"/>
  <circle cx="389" cy="316" r="4" fill="#2C1A0E"/>
  <circle cx="370.5" cy="314.5" r="1.3" fill="white"/>
  <circle cx="390.5" cy="314.5" r="1.3" fill="white"/>
  <!-- Happy expression -->
  <path d="M 370 328 Q 379 335 388 328" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="358" cy="326" r="7" fill="#F4A18A" opacity="0.3"/>
  <circle cx="400" cy="326" r="7" fill="#F4A18A" opacity="0.3"/>

  <!-- CHILD 3 — sitting right at center table -->
  <rect x="490" y="435" width="12" height="38" rx="4" fill="#C9A87C"/>
  <rect x="510" y="435" width="12" height="38" rx="4" fill="#C9A87C"/>
  <rect x="478" y="428" width="52" height="10" rx="4" fill="#B89870"/>
  <!-- Body -->
  <rect x="484" y="350" width="60" height="82" rx="18" fill="#6EB76F" opacity="0.9"/>
  <!-- Arms -->
  <rect x="468" y="368" width="18" height="11" rx="5.5" fill="#6EB76F" opacity="0.85" transform="rotate(22 468 368)"/>
  <rect x="542" y="370" width="18" height="11" rx="5.5" fill="#6EB76F" opacity="0.85" transform="rotate(-18 542 370)"/>
  <!-- Head -->
  <circle cx="514" cy="322" r="33" fill="#E8C090"/>
  <!-- Hair -->
  <path d="M 484 314 Q 496 282 514 280 Q 532 282 544 314 Q 532 294 514 292 Q 496 294 484 314 Z" fill="#5C3D1E"/>
  <!-- Eyes -->
  <circle cx="504" cy="319" r="4" fill="#2C1A0E"/>
  <circle cx="524" cy="319" r="4" fill="#2C1A0E"/>
  <circle cx="505.5" cy="317.5" r="1.3" fill="white"/>
  <circle cx="525.5" cy="317.5" r="1.3" fill="white"/>
  <!-- Smile -->
  <path d="M 505 331 Q 514 338 523 331" stroke="#6B4226" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="494" cy="329" r="7" fill="#F4A18A" opacity="0.28"/>
  <circle cx="534" cy="329" r="7" fill="#F4A18A" opacity="0.28"/>

  <!-- EDUCATOR — standing right, leaning forward toward table -->
  <!-- Legs -->
  <rect x="662" y="430" width="16" height="60" rx="6" fill="#2F4A3A"/>
  <rect x="688" y="432" width="16" height="58" rx="6" fill="#2F4A3A"/>
  <!-- Shoes -->
  <ellipse cx="670" cy="492" rx="14" ry="7" fill="#1C2B22"/>
  <ellipse cx="696" cy="494" rx="14" ry="7" fill="#1C2B22"/>
  <!-- Body / dress / top -->
  <rect x="645" y="300" width="80" height="135" rx="22" fill="#2F4A3A"/>
  <!-- Scarf / collar accent -->
  <rect x="662" y="300" width="46" height="22" rx="11" fill="#AEC1B0" opacity="0.85"/>
  <!-- Left arm (reaching toward table) -->
  <rect x="596" y="335" width="55" height="18" rx="9" fill="#2F4A3A" transform="rotate(18 596 335)"/>
  <!-- Hand left -->
  <circle cx="596" cy="350" r="10" fill="#E8C090"/>
  <!-- Right arm -->
  <rect x="723" y="330" width="40" height="15" rx="7" fill="#2F4A3A" transform="rotate(-10 723 330)"/>
  <!-- Hand right -->
  <circle cx="760" cy="333" r="9" fill="#E8C090"/>
  <!-- Head -->
  <circle cx="685" cy="268" r="42" fill="#F2D4A6"/>
  <!-- Hair (bun) -->
  <path d="M 648 260 Q 660 218 685 215 Q 710 218 722 260 Q 710 235 685 232 Q 660 235 648 260 Z" fill="#2C1A0E"/>
  <circle cx="685" cy="220" r="16" fill="#2C1A0E"/>
  <circle cx="685" cy="214" r="10" fill="#3D2B14"/>
  <!-- Eyes (warm, kind) -->
  <path d="M 672 264 Q 677 260 682 264" stroke="#2C1A0E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 688 264 Q 693 260 698 264" stroke="#2C1A0E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile warm -->
  <path d="M 675 280 Q 685 289 695 280" stroke="#8B5E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="665" cy="278" r="9" fill="#F4A18A" opacity="0.35"/>
  <circle cx="705" cy="278" r="9" fill="#F4A18A" opacity="0.35"/>

  <!-- Bookshelf on right wall -->
  <rect x="820" y="200" width="80" height="240" rx="6" fill="#C4A882"/>
  <rect x="826" y="206" width="68" height="8" rx="2" fill="#B89870"/>
  <rect x="826" y="282" width="68" height="8" rx="2" fill="#B89870"/>
  <rect x="826" y="358" width="68" height="8" rx="2" fill="#B89870"/>
  <!-- Books row 1 -->
  <rect x="828" y="214" width="12" height="64" rx="2" fill="#E2845F"/>
  <rect x="841" y="220" width="10" height="58" rx="2" fill="#6EB76F"/>
  <rect x="852" y="216" width="14" height="62" rx="2" fill="#2F4A3A"/>
  <rect x="867" y="222" width="10" height="56" rx="2" fill="#F6C84B"/>
  <rect x="878" y="218" width="10" height="60" rx="2" fill="#AEC1B0"/>
  <!-- Books row 2 -->
  <rect x="828" y="292" width="11" height="62" rx="2" fill="#AEC1B0"/>
  <rect x="840" y="295" width="14" height="59" rx="2" fill="#E2845F"/>
  <rect x="855" y="292" width="10" height="62" rx="2" fill="#6EB76F"/>
  <rect x="866" y="297" width="12" height="57" rx="2" fill="#2F4A3A" opacity="0.8"/>
  <rect x="879" y="293" width="11" height="61" rx="2" fill="#F6C84B" opacity="0.8"/>

  <!-- Soft vignette frame to blend edges -->
  <linearGradient id="vignL" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#F4EFE3" stop-opacity="0.6"/>
    <stop offset="15%" stop-color="#F4EFE3" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="vignR" x1="0" y1="0" x2="1" y2="0">
    <stop offset="85%" stop-color="#F4EFE3" stop-opacity="0"/>
    <stop offset="100%" stop-color="#F4EFE3" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="vignT" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4EFE3" stop-opacity="0.4"/>
    <stop offset="12%" stop-color="#F4EFE3" stop-opacity="0"/>
  </linearGradient>
  <rect width="900" height="675" fill="url(#vignL)"/>
  <rect width="900" height="675" fill="url(#vignR)"/>
  <rect width="900" height="675" fill="url(#vignT)"/>
</svg>
