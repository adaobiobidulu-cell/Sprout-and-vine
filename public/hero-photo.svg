    <stop offset="0%" stop-color="#FFF8ED" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#F4EFE3" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="675" fill="url(#winLight)"/>

  <!-- Floor -->
  <rect x="0" y="460" width="900" height="215" rx="0" fill="#DDD5C4"/>
  <!-- Floor shadow -->
  <rect x="0" y="460" width="900" height="14" fill="#C9C1B0" opacity="0.5"/>

  <!-- Round reading rug -->
  <ellipse cx="450" cy="520" rx="230" ry="60" fill="#D4896A" opacity="0.35"/>
  <ellipse cx="450" cy="520" rx="195" ry="50" fill="#E2845F" opacity="0.18"/>

  <!-- Back wall baseboard -->
  <rect x="0" y="440" width="900" height="20" fill="#E8E0D0"/>

  <!-- Left window -->
  <rect x="60" y="60" width="160" height="240" rx="12" fill="#D4EDD4" opacity="0.9"/>
  <rect x="60" y="60" width="160" height="240" rx="12" stroke="#2F4A3A" stroke-width="6" fill="none"/>
  <!-- Window cross -->
  <line x1="140" y1="60" x2="140" y2="300" stroke="#2F4A3A" stroke-width="4"/>
  <line x1="60" y1="178" x2="220" y2="178" stroke="#2F4A3A" stroke-width="4"/>
  <!-- Window light rays -->
  <rect x="60" y="60" width="160" height="240" rx="12" fill="url(#winLight)" opacity="0.5"/>

  <!-- Right window -->
  <rect x="660" y="80" width="150" height="200" rx="12" fill="#D4EDD4" opacity="0.9"/>
  <rect x="660" y="80" width="150" height="200" rx="12" stroke="#2F4A3A" stroke-width="5" fill="none"/>
  <line x1="735" y1="80" x2="735" y2="280" stroke="#2F4A3A" stroke-width="3.5"/>
  <line x1="660" y1="178" x2="810" y2="178" stroke="#2F4A3A" stroke-width="3.5"/>

  <!-- Wall art / children's artwork left -->
  <rect x="260" y="80" width="90" height="72" rx="6" fill="white" stroke="#DDD5C4" stroke-width="2"/>
  <!-- Simple sun drawing -->
  <circle cx="305" cy="116" r="14" fill="#F6C84B" opacity="0.85"/>
  <line x1="305" y1="96" x2="305" y2="89" stroke="#F6C84B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="305" y1="136" x2="305" y2="143" stroke="#F6C84B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="285" y1="116" x2="278" y2="116" stroke="#F6C84B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="325" y1="116" x2="332" y2="116" stroke="#F6C84B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Green hill -->
  <ellipse cx="295" cy="140" rx="22" ry="10" fill="#6EB76F" opacity="0.7"/>
  <ellipse cx="318" cy="141" rx="16" ry="8" fill="#AEC1B0" opacity="0.6"/>

  <!-- Wall art right -->
  <rect x="370" y="70" width="80" height="64" rx="6" fill="white" stroke="#DDD5C4" stroke-width="2"/>
  <!-- Rainbow -->
  <path d="M 376 124 Q 394 88 410 124" stroke="#E2845F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 380 124 Q 397 96 415 124" stroke="#F6C84B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 384 124 Q 401 103 420 124" stroke="#6EB76F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 388 124 Q 405 110 424 124" stroke="#AEC1B0" stroke-width="3" fill="none" stroke-linecap="round"/>

