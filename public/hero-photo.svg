  <rect x="240" y="160" width="300" height="26" rx="6" fill="#2F4A3A" opacity="0.12"/>
  <text x="252" y="178" font-family="Georgia, serif" font-size="13" fill="#2F4A3A" opacity="0.65" font-weight="600" letter-spacing="8">A  B  C  D  E  F  G  H</text>

  <!-- Big plant left foreground -->
  <rect x="15" y="350" width="48" height="120" rx="8" fill="#8C7B60"/>
  <!-- Plant pot -->
  <ellipse cx="39" cy="470" rx="26" ry="8" fill="#7A6A52"/>
  <!-- Plant stems -->
  <path d="M 39 350 C 20 310 5 270 18 230" stroke="#2F4A3A" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M 39 350 C 55 305 70 270 55 230" stroke="#2F4A3A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 39 380 C 15 355 -5 330 10 310" stroke="#2F4A3A" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Plant leaves -->
  <ellipse cx="16" cy="225" rx="22" ry="35" fill="#2F4A3A" transform="rotate(-20 16 225)" opacity="0.9"/>
  <ellipse cx="58" cy="228" rx="20" ry="32" fill="#6EB76F" transform="rotate(18 58 228)" opacity="0.85"/>
  <ellipse cx="8" cy="308" rx="18" ry="28" fill="#AEC1B0" transform="rotate(-30 8 308)" opacity="0.8"/>
  <ellipse cx="39" cy="210" rx="14" ry="26" fill="#2F4A3A" opacity="0.7"/>

  <!-- Small plant right side -->
  <rect x="825" y="400" width="35" height="70" rx="6" fill="#9C8B72"/>
  <ellipse cx="842" cy="400" rx="19" ry="6" fill="#8A7A62"/>
  <path d="M 842 400 C 825 370 820 340 835 320" stroke="#6EB76F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 842 400 C 858 365 868 340 855 315" stroke="#2F4A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="833" cy="318" rx="16" ry="24" fill="#6EB76F" transform="rotate(-15 833 318)" opacity="0.85"/>
  <ellipse cx="857" cy="313" rx="14" ry="22" fill="#AEC1B0" transform="rotate(20 857 313)" opacity="0.8"/>

  <!-- Low table center -->
  <rect x="260" y="390" width="380" height="20" rx="8" fill="#C4A882"/>
  <!-- Table legs -->
  <rect x="290" y="408" width="14" height="55" rx="5" fill="#B89870"/>
  <rect x="600" y="408" width="14" height="55" rx="5" fill="#B89870"/>

  <!-- Left low table -->
  <rect x="90" y="410" width="200" height="16" rx="7" fill="#CEBEA0"/>
  <rect x="110" y="424" width="12" height="45" rx="4" fill="#BEAE90"/>
  <rect x="265" y="424" width="12" height="45" rx="4" fill="#BEAE90"/>

  <!-- Activity on center table: paper, crayons, paint jars -->
  <rect x="300" y="370" width="45" height="35" rx="3" fill="white" transform="rotate(-8 300 370)"/>
  <rect x="355" y="368" width="45" height="35" rx="3" fill="#FFF5E0" transform="rotate(4 355 368)"/>
  <rect x="410" y="372" width="40" height="30" rx="3" fill="white" transform="rotate(-3 410 372)"/>
  <!-- Paint jars -->
  <rect x="480" y="366" width="16" height="22" rx="4" fill="#E2845F" opacity="0.85"/>
  <rect x="500" y="366" width="16" height="22" rx="4" fill="#6EB76F" opacity="0.85"/>
  <rect x="520" y="366" width="16" height="22" rx="4" fill="#AEC1B0" opacity="0.8"/>
  <!-- Crayon scattered -->
  <rect x="290" y="393" width="32" height="6" rx="3" fill="#F6C84B" transform="rotate(-20 290 393)"/>
  <rect x="440" y="396" width="28" height="5" rx="2.5" fill="#E2845F" transform="rotate(15 440 396)"/>

  <!-- CHILD 1 — sitting left at left table, facing center -->
  <!-- Legs on stool -->
  <rect x="145" y="430" width="12" height="40" rx="4" fill="#C9A87C"/>
  <rect x="165" y="430" width="12" height="40" rx="4" fill="#C9A87C"/>
  <!-- Small stool -->
  <rect x="132" y="425" width="54" height="10" rx="4" fill="#B89870"/>
  <!-- Body -->
  <rect x="138" y="340" width="66" height="90" rx="18" fill="#E2845F" opacity="0.9"/>
  <!-- Arms -->
  <rect x="120" y="360" width="22" height="12" rx="6" fill="#E2845F" opacity="0.85" transform="rotate(20 120 360)"/>
  <rect x="200" y="358" width="22" height="12" rx="6" fill="#E2845F" opacity="0.85" transform="rotate(-15 200 358)"/>
  <!-- Head -->
  <circle cx="171" cy="312" r="36" fill="#F4C98E"/>
  <!-- Hair -->
  <path d="M 138 302 Q 150 270 171 268 Q 192 270 204 302 Q 192 285 171 283 Q 150 285 138 302 Z" fill="#8B5E3C"/>
  <!-- Eyes -->
  <circle cx="160" cy="310" r="4.5" fill="#3A2B1A"/>
  <circle cx="182" cy="310" r="4.5" fill="#3A2B1A"/>
  <circle cx="162" cy="308" r="1.5" fill="white"/>
  <circle cx="184" cy="308" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M 162 322 Q 171 330 180 322" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- CHILD 2 — sitting at center table, facing us -->
  <rect x="353" y="435" width="12" height="38" rx="4" fill="#D4A882"/>
  <rect x="373" y="435" width="12" height="38" rx="4" fill="#D4A882"/>
  <rect x="342" y="428" width="52" height="10" rx="4" fill="#B89870"/>
  <!-- Body -->
  <rect x="348" y="348" width="62" height="84" rx="18" fill="#AEC1B0" opacity="0.95"/>
  <!-- Arms pointing down at table -->
  <rect x="332" y="368" width="18" height="12" rx="6" fill="#AEC1B0" opacity="0.9" transform="rotate(25 332 368)"/>
  <rect x="408" y="368" width="18" height="12" rx="6" fill="#AEC1B0" opacity="0.9" transform="rotate(-25 408 368)"/>
  <!-- Head -->
  <circle cx="379" cy="318" r="34" fill="#F2D4A6"/>
  <!-- Hair (ponytails) -->
  <path d="M 347 308 Q 360 275 379 273 Q 398 275 411 308 Q 398 288 379 286 Q 360 288 347 308 Z" fill="#2C1A0E"/>
  <!-- Pigtail decorations -->
